<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>breyny_05 • Instagram</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;background:#000;color:#fff}
.container{max-width:430px;margin:auto}
.header{display:flex;align-items:center;padding:15px}
.profile-pic{width:80px;height:80px;border-radius:50%;border:3px solid #ff0066;object-fit:cover}
.info{margin-left:15px}
.username{font-weight:bold;font-size:18px}
.stats{display:flex;gap:15px;font-size:14px;margin-top:5px}
.bio{font-size:13px;margin-top:8px}
.follow-btn{margin-top:8px;padding:6px 12px;border:none;border-radius:6px;background:#3897f0;color:white;cursor:pointer}
.highlights{display:flex;gap:12px;padding:10px;overflow-x:auto}
.highlight{text-align:center;font-size:12px}
.highlight img{width:65px;height:65px;border-radius:50%;border:2px solid #555;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.grid img{width:100%;aspect-ratio:1/1;object-fit:cover;cursor:pointer}

.nav{position:fixed;bottom:0;width:100%;max-width:430px;background:#111;display:flex;justify-content:space-around;padding:10px}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;overflow-y:auto}
.feed-post{max-width:500px;margin:auto;border-bottom:1px solid #222}
.feed-post img{width:100%}
.caption{padding:10px;font-size:14px}
.actions{padding:5px 10px;font-size:18px}
.likes{padding:0 10px;font-size:14px}
.comments{padding:0 10px 10px;font-size:13px;color:#ccc}
.comment-box{display:flex;padding:10px;border-top:1px solid #222}
.comment-box input{flex:1;background:#111;border:none;color:white;padding:8px}
.comment-box button{background:none;border:none;color:#3897f0}
</style>
</head>
<body>
<div class="container">

<div class="header">
<img src="profile.jpg" class="profile-pic">
<div class="info">
<div class="username">breyny_05</div>
<div class="stats">
<div><b>3</b> posts</div>
<div><b id="followers">10000</b> followers</div>
<div><b>2000</b> following</div>
</div>
<div class="bio">
Breyny Stefany De La CS 🦋<br>
23 years ago<br>
SPM, RD 🌴🇩🇴<br>
Mother, cooking and finance
</div>
<button class="follow-btn" onclick="toggleFollow()" id="followBtn">Follow</button>
</div>
</div>

<div class="highlights">
<div class="highlight" onclick="openStory('food')"><img src="food1.jpg"><div>Food</div></div>
<div class="highlight" onclick="openStory('hobby')"><img src="hobby1.jpg"><div>Hobbies</div></div>
<div class="highlight" onclick="openStory('movie')"><img src="movie1.jpg"><div>Movies</div></div>
</div>

<div class="grid">
<img src="post1.jpg" onclick="openFeed(0)">
<img src="trading.jpg" onclick="openFeed(1)">
<img src="post3.jpg" onclick="openFeed(2)">
</div>

</div>

<div class="nav">🏠 🔍 ➕ ❤️ 👤</div>

<div id="feedModal" class="modal"></div>

<script>
let following=false;
let followersCount=10000;

function toggleFollow(){
 const btn=document.getElementById('followBtn');
 if(!following){
  following=true;
  btn.innerText='Following';
  btn.style.background='#444';
  followersCount+=1;
 }else{
  following=false;
  btn.innerText='Follow';
  btn.style.background='#3897f0';
  followersCount-=1;
 }
 document.getElementById('followers').innerText=followersCount;
}

const posts=[
 {img:'post1.jpg',caption:'Dinner for my birthday with my friends 🙈',likes:1245,comments:[]},
 {img:'trading.jpg',caption:'This is how the charts look today, a great day to update your portfolio 💸',likes:2031,comments:[]},
 {img:'post3.jpg',caption:'Christmas is perfect because you are here ❤️‍🩹',likes:3876,comments:[]}
];

function openFeed(startIndex){
 const modal=document.getElementById('feedModal');
 modal.innerHTML='';
 modal.style.display='block';

 posts.forEach((p,i)=>{
  const div=document.createElement('div');
  div.className='feed-post';

  div.innerHTML=`
   <img src="${p.img}" ontouchstart="tap(${i})" onclick="tap(${i})">
   <div class="actions">❤️ 💬 📤</div>
   <div class="likes" id="likes-${i}">${p.likes} likes</div>
   <div class="caption"><b>breyny_05</b> ${p.caption}</div>
   <div class="comments" id="comments-${i}"></div>
   <div class="comment-box">
     <input placeholder="Add a comment..." id="input-${i}">
     <button onclick="addComment(${i})">Post</button>
   </div>
  `;

  modal.appendChild(div);
 });

 window.scrollTo(0,startIndex*600);
}

let lastTap=0;
function tap(i){
 let now=new Date().getTime();
 if(now-lastTap<300){
   posts[i].likes++;
   document.getElementById(`likes-${i}`).innerText=posts[i].likes+' likes';
 }
 lastTap=now;
}

function addComment(i){
 let input=document.getElementById(`input-${i}`);
 let text=input.value;
 if(text.trim()!==''){
  posts[i].comments.push(text);
  let container=document.getElementById(`comments-${i}`);
  container.innerHTML=posts[i].comments.map(c=>`<div><b>user</b> ${c}</div>`).join('');
  input.value='';
 }
}

window.addEventListener('click', function(e){
 if(e.target.id==='feedModal'){
  document.getElementById('feedModal').style.display='none';
 }
});
</script>

</body>
</html>
